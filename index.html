<!doctype html>
<html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Repaso por materia</title>
<style>
:root{--bg:#f2f4f7;--card:#fff;--line:#d6dde7;--text:#111827;--muted:#5b6577;--primary:#2563eb;--ok:#16a34a;--bad:#dc2626;--shadow:0 3px 16px rgba(15,23,42,.06)}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}img{max-width:100%;height:auto}
.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.top h1{margin:0;font-size:22px}.top p{margin:4px 0 0;font-size:12px;color:var(--muted)}.ghost{display:flex;gap:10px;align-items:center}
.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:11px 16px;font-weight:800;cursor:pointer}.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn:disabled{opacity:.55;cursor:not-allowed}
.wrap{max-width:1120px;margin:0 auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.subject{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;box-shadow:var(--shadow)}.subject:hover{border-color:#9bb6ff;background:#f8fbff}.subject b{display:block;font-size:16px;margin-bottom:6px}.subject span{font-size:13px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.title{margin:0 0 8px;font-size:25px}.small{font-size:14px;color:var(--muted)}.score{font-size:17px;font-weight:900;white-space:nowrap}.prog{margin-top:12px;height:8px;background:#e6ebf3;border-radius:99px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#22c55e);transition:width .25s ease}
.section{margin:0 0 12px;font-size:18px;font-weight:900}.qid{margin-bottom:12px;font-weight:900;color:#334155}.qtext{display:block;width:100%;background:#fff;border:1px solid #d9e1ec;border-radius:14px;padding:20px 24px;font-size:21px;line-height:1.45;font-weight:700;overflow-wrap:anywhere}.qimages,.eimages{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px}.qimages img,.eimages img{border:1px solid #e8edf5;border-radius:10px;background:#fff}
.optionsWrap{border:1px solid var(--line);border-radius:14px;background:#fbfcfe;padding:10px;overflow:auto;max-height:57vh}.option{display:grid;grid-template-columns:auto auto minmax(0,1fr);gap:12px;align-items:flex-start;background:#fff;border:1px solid transparent;border-radius:14px;padding:12px;margin:8px 0;min-width:min-content}.option:hover{border-color:#b7c7ee;background:#f9fbff}.option.correct{border-color:#22c55e;background:#ecfdf5}.option.wrong{border-color:#ef4444;background:#fff1f2}.option input{width:18px;height:18px;margin-top:6px}.letter{min-width:28px;font-size:18px;font-weight:900;padding-top:2px}.omedia{overflow:auto;max-width:100%}.omedia img{display:block;max-width:min(100%,1100px);height:auto;border-radius:8px}.otext{display:inline-block;background:#fff;border:1px solid #dbe3ee;border-radius:12px;padding:18px 22px;font-size:20px;line-height:1.42;font-weight:700;overflow-wrap:anywhere}
.expl{min-height:120px;max-height:34vh;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff;padding:14px;line-height:1.52;white-space:pre-wrap}
.bottom{position:sticky;bottom:0;z-index:25;background:rgba(242,244,247,.97);backdrop-filter:blur(8px);border-top:1px solid var(--line)}.bottom .inner{max-width:1120px;margin:0 auto;padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap}
.menuShade{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;z-index:40}.menuShade.open{display:block}.menu{width:min(560px,94vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 25px 60px rgba(0,0,0,.25);margin:20px auto;padding:16px}.menuHead{display:flex;justify-content:space-between;gap:12px;align-items:center}.menuHead h2{margin:0;font-size:22px}.search{width:100%;margin:10px 0 14px;border:1px solid var(--line);border-radius:12px;padding:12px}.menuList{display:grid;gap:8px}.mBtn{text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;cursor:pointer}.mBtn:hover{background:#f8fbff;border-color:#9bb6ff}.mBtn b{display:block}.mBtn span{font-size:12px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 18px 40px rgba(0,0,0,.28);display:none;z-index:60;max-width:min(90vw,560px)}.toast.show{display:block}
@media (max-width:780px){.top h1{font-size:18px}.top p{font-size:11px}.wrap{padding:10px}.card{padding:12px;border-radius:14px}.title{font-size:21px}.score{font-size:14px}.qtext{font-size:18px;padding:16px}.optionsWrap{max-height:50vh;padding:8px}.option{grid-template-columns:auto auto minmax(260px,1fr);padding:10px}.otext{font-size:18px;padding:14px 16px}.omedia img{max-width:none;width:auto}}
</style></head><body>
<header class="top"><div><h1>Repaso por materia</h1><p>Versión web compatible con Safari, Chrome, iPhone, iPad y PC</p></div><button id="menuBtn" class="btn">Menú</button></header>
<div id="menuShade" class="menuShade"><div class="menu"><div class="menuHead"><h2>Materias</h2><button id="closeMenuBtn" class="btn">Cerrar</button></div><input id="search" class="search" placeholder="Buscar materia..."><div id="menuList" class="menuList"></div></div></div>
<main class="wrap"><section id="home" class="grid"></section><section id="quiz" style="display:none">
<div class="card header"><div><h2 id="subjectTitle" class="title"></h2><div id="counter" class="small"></div><div class="prog"><div id="bar" class="bar"></div></div></div><div id="score" class="score">Aciertos: 0</div></div>
<div class="card"><h3 class="section">Enunciado</h3><div id="qid" class="qid"></div><div id="qtext" class="qtext"></div><div id="qimages" class="qimages"></div></div>
<div class="card"><h3 class="section">Opciones</h3><div id="options" class="optionsWrap"></div></div>
<div class="card"><h3 class="section">Proceso / explicación</h3><div id="expl" class="expl">Responde para ver aquí el proceso o la explicación.</div></div>
</section></main>
<div class="bottom"><div class="inner"><button id="answerBtn" class="btn primary" disabled>Responder</button><button id="nextBtn" class="btn" disabled>Siguiente</button><button id="restartBtn" class="btn" disabled>Reiniciar materia</button></div></div>
<div id="toast" class="toast"></div>
<script>window.__QUIZ_PARTS=[];</script>
<script src="data_part_01.js"></script>
<script src="data_part_02.js"></script>
<script src="data_part_03.js"></script>
<script>
const DATA={subjects:window.__QUIZ_PARTS.flat()};
const $=id=>document.getElementById(id);
const el={home:$('home'),quiz:$('quiz'),menuShade:$('menuShade'),menuList:$('menuList'),search:$('search'),subjectTitle:$('subjectTitle'),counter:$('counter'),bar:$('bar'),score:$('score'),qid:$('qid'),qtext:$('qtext'),qimages:$('qimages'),options:$('options'),expl:$('expl'),answerBtn:$('answerBtn'),nextBtn:$('nextBtn'),restartBtn:$('restartBtn'),toast:$('toast')};
let subjIndex=null, questions=[], i=0, score=0, answered=false;
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function showToast(msg){el.toast.textContent=msg; el.toast.classList.add('show'); clearTimeout(showToast.t); showToast.t=setTimeout(()=>el.toast.classList.remove('show'),2200)}
function openMenu(){el.menuShade.classList.add('open')} function closeMenu(){el.menuShade.classList.remove('open')}
$('menuBtn').onclick=openMenu; $('closeMenuBtn').onclick=closeMenu; el.menuShade.addEventListener('click',e=>{if(e.target===el.menuShade)closeMenu()})
function renderHome(){el.home.innerHTML=DATA.subjects.map((s,idx)=>`<div class="subject" data-i="${idx}"><b>${String(idx+1).padStart(2,'0')}. ${esc(s.title)}</b><span>${s.questions.length} preguntas</span></div>`).join(''); el.home.querySelectorAll('.subject').forEach(x=>x.onclick=()=>start(+x.dataset.i))}
function renderMenu(filter=''){const f=filter.trim().toLowerCase(); const arr=DATA.subjects.map((s,idx)=>({s,idx})).filter(x=>x.s.title.toLowerCase().includes(f)); el.menuList.innerHTML=arr.map(x=>`<button class="mBtn" data-i="${x.idx}"><b>${String(x.idx+1).padStart(2,'0')}. ${esc(x.s.title)}</b><span>${x.s.questions.length} preguntas</span></button>`).join(''); el.menuList.querySelectorAll('.mBtn').forEach(b=>b.onclick=()=>start(+b.dataset.i))}
el.search.addEventListener('input',e=>renderMenu(e.target.value));
function start(idx){subjIndex=idx; questions=DATA.subjects[idx].questions.slice(); i=0; score=0; answered=false; el.home.style.display='none'; el.quiz.style.display='block'; el.restartBtn.disabled=false; closeMenu(); load(); window.scrollTo({top:0,behavior:'smooth'})}
function load(){const s=DATA.subjects[subjIndex], q=questions[i]; answered=false; el.subjectTitle.textContent=s.title; el.counter.textContent=`Pregunta ${i+1} de ${questions.length}`; el.score.textContent=`Aciertos: ${score}`; el.bar.style.width=`${(i/questions.length)*100}%`; el.qid.textContent=`ID: ${q.id}`; el.qtext.textContent=q.text||''; el.qimages.innerHTML=(q.questionImages||[]).map(src=>`<img loading="lazy" src="${src}" alt="imagen del enunciado">`).join(''); renderOptions(q); el.expl.textContent='Responde para ver aquí el proceso o la explicación.'; el.answerBtn.disabled=false; el.nextBtn.disabled=true;}
function renderOptions(q){const type=q.multi?'checkbox':'radio'; el.options.innerHTML=q.options.map(opt=>`<label class="option" data-letter="${opt.letter}"><input type="${type}" name="resp" value="${opt.letter}"><span class="letter">${opt.letter})</span><div class="omedia">${opt.images&&opt.images.length?opt.images.map(src=>`<img loading="lazy" src="${src}" alt="opción ${opt.letter}">`).join(''):`<div class="otext">${esc(opt.text)}</div>`}</div></label>`).join('')}
function selected(){return [...el.options.querySelectorAll('input:checked')].map(x=>x.value).sort()}
function answerArr(ans){return Array.isArray(ans)?ans.slice().sort():[ans]}
function respond(){if(answered)return; const q=questions[i]; const sel=selected(); if(!sel.length){showToast('Selecciona una opción antes de responder.'); return;} const corr=answerArr(q.answer).filter(Boolean).sort(); const ok=sel.length===corr.length && sel.every((v,j)=>v===corr[j]); answered=true; if(ok)score++; el.score.textContent=`Aciertos: ${score}`; el.bar.style.width=`${((i+1)/questions.length)*100}%`; el.options.querySelectorAll('.option').forEach(row=>{const l=row.dataset.letter; if(corr.includes(l))row.classList.add('correct'); if(sel.includes(l)&&!corr.includes(l))row.classList.add('wrong'); const inp=row.querySelector('input'); if(inp)inp.disabled=true;}); const msg=(ok?'✅ Correcto.':'❌ Incorrecto.
Tu respuesta: '+sel.join(', ')+'
Correcta: '+corr.join(', ')); el.expl.innerHTML=`<div>${esc(msg + (q.explanation?'

'+q.explanation:''))}</div>` + ((q.explanationImages||[]).length?`<div class="eimages">${q.explanationImages.map(src=>`<img loading="lazy" src="${src}" alt="explicación">`).join('')}</div>`:''); el.answerBtn.disabled=true; el.nextBtn.disabled=false; showToast(ok?'Correcto':'Incorrecto')}
function nextQ(){if(i<questions.length-1){i++; load(); window.scrollTo({top:0,behavior:'smooth'})}else{el.answerBtn.disabled=true; el.nextBtn.disabled=true; showToast(`Materia finalizada. Aciertos: ${score} de ${questions.length}`)}}
function restart(){if(subjIndex!==null)start(subjIndex)}
el.answerBtn.onclick=respond; el.nextBtn.onclick=nextQ; el.restartBtn.onclick=restart; renderHome(); renderMenu();
</script></body></html>
